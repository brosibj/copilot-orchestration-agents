name: Tag Release

# Fires when a PR labeled "release" is merged into main,
# or can be run manually with an explicit version.
on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: Version tag to create and release (for example v1.0.0)
        required: true
        type: string
      target_ref:
        description: Branch or commit to tag when run manually
        required: true
        default: main
        type: string

permissions:
  contents: write

jobs:
  tag:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.merged == true &&
        contains(github.event.pull_request.labels.*.name, 'release')
      )
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.version }}"
          else
            TITLE="${{ github.event.pull_request.title }}"
            TAG=$(echo "$TITLE" | grep -oP 'v\d+\.\d+\.\d+')
          fi
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Version must match v<major>.<minor>.<patch> (for example v1.0.0)"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || 'main' }}

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags origin
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists; continuing"
          else
            git tag ${{ steps.version.outputs.tag }}
            git push origin ${{ steps.version.outputs.tag }}
          fi

  release:
    needs: tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag }}

      - name: Build install bundles
        run: |
          set -euo pipefail

          build_suite() {
            SUITE_NAME="$1"
            SUITE_DIR="suites/$SUITE_NAME"
            BUNDLE_DIR="dist/$SUITE_NAME"

            mkdir -p "$BUNDLE_DIR/.github"
            cp suites/copilot-instructions.md "$BUNDLE_DIR/.github/copilot-instructions.md"
            cp -R "$SUITE_DIR/agents" "$BUNDLE_DIR/.github/"
            cp -R "$SUITE_DIR/prompts" "$BUNDLE_DIR/.github/"
            cp -R "$SUITE_DIR/skills" "$BUNDLE_DIR/.github/"
            cp -R "$SUITE_DIR/instructions" "$BUNDLE_DIR/.github/"

            (
              cd "$BUNDLE_DIR"
              zip -r "../copilot-suite-${SUITE_NAME}-${{ needs.tag.outputs.tag }}.zip" .github
            )
          }

          rm -rf dist
          mkdir -p dist
          build_suite coding
          build_suite project

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ needs.tag.outputs.tag }}"
          NOTES=$(awk "/^## \[?${VERSION#v}\]?/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          files: dist/*.zip
          body: ${{ steps.changelog.outputs.notes }}
