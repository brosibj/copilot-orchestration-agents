name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve version
        id: version
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Build install bundles
        run: |
          set -euo pipefail

          build_suite() {
            SUITE_NAME="$1"
            SUITE_DIR="suites/$SUITE_NAME"
            BUNDLE_DIR="dist/$SUITE_NAME"

            mkdir -p "$BUNDLE_DIR/.github"
            cp suites/copilot-instructions.md "$BUNDLE_DIR/.github/copilot-instructions.md"
            cp -R "$SUITE_DIR/agents" "$BUNDLE_DIR/.github/"
            cp -R "$SUITE_DIR/prompts" "$BUNDLE_DIR/.github/"
            cp -R "$SUITE_DIR/skills" "$BUNDLE_DIR/.github/"
            cp -R "$SUITE_DIR/instructions" "$BUNDLE_DIR/.github/"

            (
              cd "$BUNDLE_DIR"
              zip -r "../copilot-suite-${SUITE_NAME}-${{ steps.version.outputs.tag }}.zip" .github
            )
          }

          rm -rf dist
          mkdir -p dist
          build_suite coding
          build_suite project

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          # Extract the block between this version header and the next
          NOTES=$(awk "/^## \[?${VERSION#v}\]?/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: dist/*.zip
          body: ${{ steps.changelog.outputs.notes }}
