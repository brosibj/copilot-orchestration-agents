name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve version
        id: version
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Build bundle
        run: |
          rm -rf dist/bundle
          mkdir -p dist/bundle
          cp -R .github dist/bundle/
          cp -R docs dist/bundle/
          cp -R workflows dist/bundle/
          cp README.md dist/bundle/
          cp workflows/copilot-instructions.md dist/bundle/.github/copilot-instructions.md
          (
            cd dist/bundle
            zip -r ../copilot-agents-${{ steps.version.outputs.tag }}.zip .
          )

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          # Extract the block between this version header and the next
          NOTES=$(awk "/^## \[?${VERSION#v}\]?/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: dist/copilot-agents-${{ steps.version.outputs.tag }}.zip
          body: ${{ steps.changelog.outputs.notes }}
